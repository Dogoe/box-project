  mail:
    host: localhost        # MailHog runs locally
    port: 1025             # default MailHog SMTP port
    username: ""           # no auth needed
    password: ""           # no auth needed
    properties:
      mail:
        smtp:
          auth: false      # disable auth
          starttls:
            enable: false # MailHog does not need TLS

